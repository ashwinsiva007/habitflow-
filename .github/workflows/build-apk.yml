name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Next.js Static Export
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyDjYbHI-_DnL0jviLlN9tDEHr7OD4bPtxE
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: habit-flo.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: habit-flo
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: habit-flo.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "305596604242"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:305596604242:web:33f2c03efd8ec61f6b248b"
        run: npx next build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Initialize Capacitor
        run: npx cap init HabitFlow com.habitflow.app --web-dir=out

      - name: Add Android Platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HabitFlow-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
