name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyDjYbHI-_DnL0jviLlN9tDEHr7OD4bPtxE
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: habit-flo.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: habit-flo
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: habit-flo.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "305596604242"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:305596604242:web:33f2c03efd8ec61f6b248b"
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          npx cap init HabitFlow com.habitflow.app --web-dir=out
          npx cap add android
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HabitFlow-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
